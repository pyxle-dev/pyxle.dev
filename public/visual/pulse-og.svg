<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pulse — service status, in real time. A Pyxle demo.">
  <defs>
    <linearGradient id="og-brand" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="og-glow" cx="0" cy="0" r="1" gradientTransform="translate(180 120) rotate(34) scale(720 520)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e3a8a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#08090d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="og-dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#08090d"/>
  <rect width="1200" height="630" fill="url(#og-dots)"/>
  <rect width="1200" height="630" fill="url(#og-glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="629" rx="0" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- brand -->
  <g transform="translate(96 92)">
    <rect x="1" y="1" width="52" height="52" rx="14" stroke="url(#og-brand)" stroke-width="2.5"/>
    <path d="M9 27h6l4-12 7 24 5-15 3.5 3.5h11" stroke="url(#og-brand)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="36" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Pulse</text>
  </g>

  <!-- headline -->
  <text x="96" y="296" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="700" fill="#ffffff" letter-spacing="-2.5">Service status,</text>
  <text x="96" y="384" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="700" letter-spacing="-2.5" fill="url(#og-brand)">in real time.</text>

  <text x="98" y="446" font-family="Inter, system-ui, sans-serif" font-size="27" font-weight="400" fill="#a1a1aa">A Pyxle demo — ISR caching, live WebSockets, Pydantic actions, background jobs.</text>

  <!-- status pills -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" font-weight="500">
    <g transform="translate(96 506)">
      <rect width="166" height="40" rx="20" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.25"/>
      <circle cx="24" cy="20" r="5" fill="#34d399"/>
      <text x="40" y="26" fill="#6ee7b7">Operational</text>
    </g>
    <g transform="translate(278 506)">
      <rect width="158" height="40" rx="20" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.25"/>
      <circle cx="24" cy="20" r="5" fill="#fbbf24"/>
      <text x="40" y="26" fill="#fcd34d">Degraded</text>
    </g>
    <g transform="translate(452 506)">
      <rect width="190" height="40" rx="20" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.25"/>
      <circle cx="24" cy="20" r="5" fill="#38bdf8"/>
      <text x="40" y="26" fill="#7dd3fc">Maintenance</text>
    </g>
  </g>

  <!-- live waveform, right -->
  <g transform="translate(792 196)" opacity="0.95">
    <path d="M0 150 H70 L96 70 L140 244 L182 96 L208 150 H300 L326 116 L360 184 L392 150 H470"
          stroke="url(#og-brand)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="470" cy="150" r="7" fill="#22d3ee"/>
    <circle cx="470" cy="150" r="13" fill="#22d3ee" fill-opacity="0.25"/>
  </g>

  <text x="1104" y="566" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" fill="#52525b">Built with Pyxle</text>
</svg>
