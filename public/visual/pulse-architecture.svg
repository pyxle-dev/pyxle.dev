<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How a Pulse request flows through Pyxle: the middleware stack, then the page, action, and WebSocket lanes.">
  <defs>
    <linearGradient id="hw-brand" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="hw-arrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M1 1L8 4.5L1 8" stroke="#3f4452" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#08090d"/>

  <!-- Browser -->
  <g>
    <rect x="500" y="20" width="200" height="48" rx="12" fill="#0e1119" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="524" cy="44" r="5" fill="#22d3ee"/>
    <text x="540" y="49" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#fafafa">Browser</text>
    <line x1="600" y1="68" x2="600" y2="96" stroke="#3f4452" stroke-width="1.6" marker-end="url(#hw-arrow)"/>
  </g>

  <!-- Starlette ASGI + middleware -->
  <g>
    <rect x="80" y="100" width="1040" height="92" rx="16" fill="#0c0e14" stroke="url(#hw-brand)" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="104" y="132" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Starlette ASGI app</text>
    <text x="104" y="152" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#71717a">middleware stack · outer → inner</text>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#a5b4fc">
      <g transform="translate(104 162)">
        <rect width="150" height="22" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.25"/>
        <text x="12" y="15">request-id · timing</text>
      </g>
      <g transform="translate(266 162)">
        <rect width="92" height="22" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.25"/>
        <text x="12" y="15">rate-limit</text>
      </g>
      <g transform="translate(370 162)">
        <rect width="96" height="22" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.25"/>
        <text x="12" y="15">CORS / CSRF</text>
      </g>
      <g transform="translate(478 162)">
        <rect width="64" height="22" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.25"/>
        <text x="12" y="15">static</text>
      </g>
      <g transform="translate(554 162)">
        <rect width="168" height="22" rx="6" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-opacity="0.3"/>
        <text x="12" y="15">ServerTiming (custom)</text>
      </g>
    </g>
  </g>

  <!-- fan-out to three lanes -->
  <path d="M600 192 V210 H250 V236" stroke="#3f4452" stroke-width="1.6" fill="none" marker-end="url(#hw-arrow)"/>
  <path d="M600 192 V236" stroke="#3f4452" stroke-width="1.6" fill="none" marker-end="url(#hw-arrow)"/>
  <path d="M600 192 V210 H950 V236" stroke="#3f4452" stroke-width="1.6" fill="none" marker-end="url(#hw-arrow)"/>

  <!-- lane headers -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" font-weight="600" letter-spacing="1">
    <text x="250" y="232" text-anchor="middle" fill="#34d399">GET · PAGE</text>
    <text x="600" y="232" text-anchor="middle" fill="#fbbf24">POST · @action</text>
    <text x="950" y="232" text-anchor="middle" fill="#22d3ee">WS · REALTIME</text>
  </g>

  <!-- ============ LANE A: GET page (6 cards) ============ -->
  <g font-family="Inter, system-ui, sans-serif">
    <!-- card template repeated -->
    <g transform="translate(95 244)">
      <rect width="310" height="50" rx="11" fill="#0e1119" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">ISR page cache</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#34d399">x-pyxle-cache: HIT / MISS / STALE</text>
    </g>
    <line x1="250" y1="294" x2="250" y2="318" stroke="#3f4452" stroke-width="1.6" marker-end="url(#hw-arrow)"/>
    <g transform="translate(95 320)">
      <rect width="310" height="50" rx="11" fill="#0e1119" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">@server loader</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#71717a">returns {'{'} data, revalidate {'}'}</text>
    </g>
    <line x1="250" y1="370" x2="250" y2="394" stroke="#3f4452" stroke-width="1.6" marker-end="url(#hw-arrow)"/>
    <g transform="translate(95 396)">
      <rect width="310" height="50" rx="11" fill="#0e1119" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">pyxle-db</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#71717a">fetchall · SQLite</text>
    </g>
    <line x1="250" y1="446" x2="250" y2="470" stroke="#3f4452" stroke-width="1.6" marker-end="url(#hw-arrow)"/>
    <g transform="translate(95 472)">
      <rect width="310" height="50" rx="11" fill="#0e1119" stroke="#22d3ee" stroke-opacity="0.3"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">Streaming SSR</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#38bdf8">React 18 · &lt;Suspense&gt; · esbuild</text>
    </g>
    <line x1="250" y1="522" x2="250" y2="546" stroke="#3f4452" stroke-width="1.6" marker-end="url(#hw-arrow)"/>
    <g transform="translate(95 548)">
      <rect width="310" height="50" rx="11" fill="#0e1119" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">HTML + hydrate</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#71717a">modulepreload · Vite</text>
    </g>
  </g>

  <!-- ============ LANE B: POST action (4 cards) ============ -->
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(450 244)">
      <rect width="300" height="50" rx="11" fill="#0e1119" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">@action</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#71717a">/api/__actions/report/...</text>
    </g>
    <line x1="600" y1="294" x2="600" y2="318" stroke="#3f4452" stroke-width="1.6" marker-end="url(#hw-arrow)"/>
    <g transform="translate(450 320)">
      <rect width="300" height="50" rx="11" fill="#0e1119" stroke="#fbbf24" stroke-opacity="0.3"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">Pydantic validate</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#fcd34d">422 + per-field errors</text>
    </g>
    <line x1="600" y1="370" x2="600" y2="394" stroke="#3f4452" stroke-width="1.6" marker-end="url(#hw-arrow)"/>
    <g transform="translate(450 396)">
      <rect width="300" height="50" rx="11" fill="#0e1119" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">pyxle-db · transaction</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#71717a">write · commit / rollback</text>
    </g>
    <line x1="600" y1="446" x2="600" y2="470" stroke="#3f4452" stroke-width="1.6" marker-end="url(#hw-arrow)"/>
    <g transform="translate(450 472)">
      <rect width="300" height="50" rx="11" fill="#0e1119" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">background task</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#71717a">runs after the response</text>
    </g>
  </g>

  <!-- ============ LANE C: WS (3 cards) ============ -->
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(795 244)">
      <rect width="310" height="50" rx="11" fill="#0e1119" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">websocket(ws)</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#71717a">same .pyxl file as the page</text>
    </g>
    <line x1="950" y1="294" x2="950" y2="318" stroke="#3f4452" stroke-width="1.6" marker-end="url(#hw-arrow)"/>
    <g transform="translate(795 320)">
      <rect width="310" height="50" rx="11" fill="#0e1119" stroke="#22d3ee" stroke-opacity="0.3"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">pyxle.realtime channel</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#38bdf8">pub / sub · in-process broker</text>
    </g>
    <line x1="950" y1="370" x2="950" y2="394" stroke="#3f4452" stroke-width="1.6" marker-end="url(#hw-arrow)"/>
    <g transform="translate(795 396)">
      <rect width="310" height="50" rx="11" fill="#0e1119" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="18" y="24" font-size="15" font-weight="600" fill="#fafafa">broadcast → subscribers</text>
      <text x="18" y="40" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#71717a">every open tab, live</text>
    </g>
    <!-- return to browser -->
    <path d="M950 446 V486 H1150 V44 H700" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.4" fill="none" stroke-dasharray="4 5" marker-end="url(#hw-arrow)"/>
  </g>

  <text x="600" y="664" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#52525b">Python-first · one .pyxl file colocates the loader, the action, the socket, and the React UI.</text>
</svg>
